<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haltern am See · 1. Mai</title>
    <meta
      name="description"
      content="Kompakte Wetterübersicht für Haltern am See am 1. Mai: Morgen, Nachmittag, Abend."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;1,7..72,400&family=Syne:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="glow glow-a" aria-hidden="true"></div>
    <div class="glow glow-b" aria-hidden="true"></div>

    <main class="shell">
      <header class="intro">
        <p class="location" id="location-line">Haltern am See</p>
        <h1 class="title" id="primary-title">1. Mai 2026</h1>
        <p class="fallback-note" id="fallback-note" hidden></p>
      </header>

      <section class="dayparts" id="dayparts-container" aria-label="Wetter nach Tagesabschnitten"></section>

      <footer class="meta">
        <p class="updated" id="generated-at-footer">—</p>
        <p class="source-line" id="source-line" hidden></p>
      </footer>

      <p class="status-message" id="status-message" hidden role="alert"></p>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
